<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Manage Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 2rem;
        }
        .admin-container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .btn {
            background: #3b82f6;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-danger { background: #ef4444; }
        .btn-warning { background: #eab308; color: #0f172a; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn:hover { opacity: 0.85; transform: scale(0.98); }
        .form-card {
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 1rem;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-family: inherit;
        }
        .image-preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #3b82f6;
        }
        .websites-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .admin-card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .admin-card-info h3 { margin-bottom: 0.2rem; }
        .admin-card-actions button {
            margin-left: 0.5rem;
            padding: 0.4rem 1rem;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: #1e293b;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
        }
        .hidden { display: none; }
        .small-note { font-size: 0.75rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 1rem;"></i>
        <h3>Admin Authentication</h3>
        <input type="password" id="adminPassword" placeholder="Enter password" style="margin: 1rem 0;">
        <button class="btn" id="loginBtn">Unlock Panel</button>
        <div class="small-note">Default: admin123</div>
    </div>
</div>

<div id="adminContent" class="admin-container hidden">
    <div class="header-bar">
        <div><h1><i class="fas fa-pen-ruler"></i> Admin Dashboard</h1><p>Manage your websites & images (slider ready)</p></div>
        <div><button class="btn-outline btn" id="viewPublicBtn"><i class="fas fa-eye"></i> View Public Site</button></div>
    </div>

    <!-- Add / Edit Form -->
    <div class="form-card">
        <h3 id="formTitle">➕ Add New Website</h3>
        <input type="hidden" id="editDocId" value="">
        <div class="form-group">
            <label>Website/Project Name</label>
            <input type="text" id="websiteName" placeholder="e.g., EcoVista Web3" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="websiteDesc" rows="2" placeholder="Short description..."></textarea>
        </div>
        <div class="form-group">
            <label>Upload Images (multi-select) → for slider</label>
            <input type="file" id="imageFiles" multiple accept="image/jpeg,image/png,image/webp">
            <div id="newImagePreview" class="image-preview-area"></div>
            <div class="small-note">Images will be uploaded to Firebase Storage and linked automatically.</div>
        </div>
        <div class="form-group">
            <label>Existing Image URLs (optional – add extra links)</label>
            <input type="text" id="extraUrl" placeholder="https://...">
            <button type="button" class="btn-outline btn" id="addUrlBtn" style="margin-top: 5px;">+ Add URL</button>
            <div id="urlList" class="image-preview-area"></div>
        </div>
        <button class="btn" id="saveWebsiteBtn">💾 Save Website</button>
        <button class="btn-danger btn" id="cancelEditBtn" style="display: none;">Cancel</button>
    </div>

    <!-- Existing websites list -->
    <h3><i class="fas fa-layer-group"></i> Published Websites</h3>
    <div id="websitesListAdmin" class="websites-list">Loading...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB16iYSnLIi95GOuLKnhwHosZZozmKGCAA",
        authDomain: "bibek-patra-web-page.firebaseapp.com",
        projectId: "bibek-patra-web-page",
        storageBucket: "bibek-patra-web-page.firebasestorage.app",
        messagingSenderId: "814616985051",
        appId: "1:814616985051:web:713590937c3be5e5813bfe"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentEditId = null;
    let tempImageUrls = []; // store urls from extra + newly uploaded

    // ---------- LOGIN ----------
    const loginOverlay = document.getElementById('loginOverlay');
    const adminContent = document.getElementById('adminContent');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('adminPassword');
    
    function checkAuth() {
        const isAuth = sessionStorage.getItem('admin_auth') === 'true';
        if (isAuth) {
            loginOverlay.classList.add('hidden');
            adminContent.classList.remove('hidden');
            loadAllWebsites();
        } else {
            loginOverlay.classList.remove('hidden');
            adminContent.classList.add('hidden');
        }
    }
    loginBtn.addEventListener('click', () => {
        if (passwordInput.value === 'admin123') {
            sessionStorage.setItem('admin_auth', 'true');
            checkAuth();
        } else {
            alert('Wrong password! Use admin123');
        }
    });
    checkAuth();

    // load websites for admin list
    async function loadAllWebsites() {
        const container = document.getElementById('websitesListAdmin');
        container.innerHTML = '<div>Loading...</div>';
        try {
            const q = query(collection(db, "websites"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            if (snap.empty) {
                container.innerHTML = '<div>✨ No websites yet. Create one above.</div>';
                return;
            }
            let html = '';
            snap.forEach(docSnap => {
                const data = docSnap.data();
                html += `
                    <div class="admin-card" data-id="${docSnap.id}">
                        <div class="admin-card-info">
                            <h3>${escapeHtml(data.name || '')}</h3>
                            <p>${escapeHtml(data.description || '')} | 📸 ${data.imageUrls?.length || 0} images</p>
                        </div>
                        <div class="admin-card-actions">
                            <button class="btn-warning btn edit-btn" data-id="${docSnap.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-danger btn delete-btn" data-id="${docSnap.id}"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            // attach edit/delete
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    editWebsite(id);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('Delete this website and all its images from storage?')) {
                        await deleteWebsite(id);
                    }
                });
            });
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div>Error loading data</div>';
        }
    }

    async function deleteWebsite(id) {
        try {
            const docRef = doc(db, "websites", id);
            const docSnap = await getDocs(query(collection(db, "websites"))); // better to fetch doc directly
            // Actually need to get imageUrls to delete from storage
            const snapshot = await getDocs(collection(db, "websites"));
            let targetData = null;
            snapshot.forEach(d => { if(d.id === id) targetData = d.data(); });
            if(targetData && targetData.imageUrls) {
                for(let url of targetData.imageUrls) {
                    try {
                        const fileRef = ref(storage, url);
                        await deleteObject(fileRef).catch(e => console.warn("could not delete", e));
                    } catch(e) {}
                }
            }
            await deleteDoc(docRef);
            alert('Deleted successfully');
            loadAllWebsites();
            resetForm();
        } catch (err) { alert('Error deleting: '+err.message); }
    }

    async function editWebsite(id) {
        currentEditId = id;
        document.getElementById('editDocId').value = id;
        document.getElementById('formTitle').innerText = '✏️ Edit Website';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        // fetch data
        const qSnap = await getDocs(collection(db, "websites"));
        let found = null;
        qSnap.forEach(d => { if(d.id === id) found = d.data(); });
        if(found) {
            document.getElementById('websiteName').value = found.name || '';
            document.getElementById('websiteDesc').value = found.description || '';
            tempImageUrls = found.imageUrls || [];
            renderUrlList(tempImageUrls);
        }
    }

    function renderUrlList(urls) {
        const container = document.getElementById('urlList');
        container.innerHTML = '';
        urls.forEach((url, idx) => {
            const div = document.createElement('div');
            div.className = 'preview-img';
            div.style.position = 'relative';
            div.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;"><button class="remove-url" data-url="${url}" style="position:absolute; top:-8px; right:-8px; background:red; border-radius:50%; width:20px; height:20px; color:white; border:none;">✖</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.remove-url').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const urlToRemove = btn.getAttribute('data-url');
                tempImageUrls = tempImageUrls.filter(u => u !== urlToRemove);
                renderUrlList(tempImageUrls);
            });
        });
    }

    async function uploadNewImages(files) {
        const uploadPromises = Array.from(files).map(async (file) => {
            const timestamp = Date.now() + Math.random();
            const storageRef = ref(storage, `websites/${currentEditId || 'temp'}/${timestamp}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            return url;
        });
        return await Promise.all(uploadPromises);
    }

    document.getElementById('saveWebsiteBtn').addEventListener('click', async () => {
        const name = document.getElementById('websiteName').value.trim();
        if(!name) { alert('Name is required'); return; }
        const desc = document.getElementById('websiteDesc').value;
        const files = document.getElementById('imageFiles').files;
        let newUrls = [...tempImageUrls];
        if(files.length > 0) {
            const uploaded = await uploadNewImages(files);
            newUrls.push(...uploaded);
        }
        const extraUrlInput = document.getElementById('extraUrl');
        if(extraUrlInput.value.trim()) {
            newUrls.push(extraUrlInput.value.trim());
            extraUrlInput.value = '';
        }
        const dataToSave = {
            name: name,
            description: desc,
            imageUrls: newUrls,
            updatedAt: new Date()
        };
        try {
            if(currentEditId) {
                const docRef = doc(db, "websites", currentEditId);
                await updateDoc(docRef, dataToSave);
                alert('Updated!');
            } else {
                dataToSave.createdAt = new Date();
                await addDoc(collection(db, "websites"), dataToSave);
                alert('Added!');
            }
            resetForm();
            loadAllWebsites();
        } catch(e) { alert('Save error: '+e.message); }
    });

    function resetForm() {
        document.getElementById('websiteName').value = '';
        document.getElementById('websiteDesc').value = '';
        document.getElementById('imageFiles').value = '';
        document.getElementById('extraUrl').value = '';
        document.getElementById('editDocId').value = '';
        document.getElementById('formTitle').innerText = '➕ Add New Website';
        document.getElementById('cancelEditBtn').style.display = 'none';
        currentEditId = null;
        tempImageUrls = [];
        renderUrlList([]);
    }
    document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
    document.getElementById('addUrlBtn').addEventListener('click', () => {
        const url = document.getElementById('extraUrl').value.trim();
        if(url && (url.startsWith('http'))) {
            tempImageUrls.push(url);
            renderUrlList(tempImageUrls);
            document.getElementById('extraUrl').value = '';
        } else alert('Enter valid image URL');
    });
    document.getElementById('viewPublicBtn').addEventListener('click', () => {
        window.open('public.html', '_blank');
    });
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    window.resetForm = resetForm;
</script>
</body>
</html>
